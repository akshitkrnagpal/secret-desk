<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SecretDesk · Pane</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; -webkit-font-smoothing: antialiased; font-family: 'Inter', -apple-system, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="pane-icons.jsx"></script>
<script type="text/babel" src="pane.jsx"></script>
<script type="text/babel" src="pane-states.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": true,
  "accent": "#1F1F1F",
  "density": "comfy",
  "layout": "row",
  "iconVariant": "C",
  "sidebarVisible": true
}/*EDITMODE-END*/;

const ACCENT_PRESETS = [
  { id: 'coral',  hex: '#C05037', label: 'Coral' },
  { id: 'slate',  hex: '#3D6AA3', label: 'Slate' },
  { id: 'forest', hex: '#2E7848', label: 'Forest' },
  { id: 'plum',   hex: '#7C5BC4', label: 'Plum' },
  { id: 'ink',    hex: '#1F1F1F', label: 'Ink' },
];

function IconShowcase({ dark, accent }) {
  const variants = [
    { id: 'A', name: 'Stacked panes', sub: 'Two offset rects · key over value' },
    { id: 'B', name: 'Asterisk', sub: 'Mono ∗ glyph · the universal redacted' },
    { id: 'C', name: 'Side-pane', sub: 'Tile divided · architectural' },
  ];
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0,
      width: 1100, background: dark ? '#15151A' : '#fff', borderRadius: 12,
      border: `0.5px solid ${dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)'}`,
    }}>
      {variants.map((v, i) => (
        <div key={v.id} style={{
          padding: '32px 28px',
          borderRight: i < 2 ? `0.5px solid ${dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)'}` : 'none',
          display: 'flex', flexDirection: 'column', gap: 18,
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', gap: 8,
            fontFamily: 'JetBrains Mono', fontSize: 11,
            color: dark ? 'rgba(237,234,227,0.55)' : 'rgba(21,19,15,0.55)',
            letterSpacing: '0.06em', textTransform: 'uppercase',
          }}>
            <span style={{ fontWeight: 700, color: accent }}>{v.id}</span>
            <span>·</span>
            <span>{v.name}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 16 }}>
            <PaneIcon size={88} dark={dark} accent={accent} variant={v.id} />
            <PaneIcon size={56} dark={dark} accent={accent} variant={v.id} />
            <PaneIcon size={32} dark={dark} accent={accent} variant={v.id} />
            <PaneIcon size={20} dark={dark} accent={accent} variant={v.id} />
          </div>
          <div style={{
            fontFamily: 'Inter', fontSize: 12.5,
            color: dark ? 'rgba(237,234,227,0.55)' : 'rgba(21,19,15,0.55)',
            lineHeight: 1.5,
          }}>{v.sub}</div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const props = {
    dark: tw.dark, accent: tw.accent, density: tw.density,
    layout: tw.layout, sidebarVisible: tw.sidebarVisible,
    iconVariant: tw.iconVariant,
  };

  return (
    <>
      <DesignCanvas>
        <DCSection id="overview" title="SecretDesk · Pane"
          subtitle="The chosen direction, built out. Use the Tweaks panel to flip dark mode, swap accent, change density, layout, and icon variant — every artboard updates live.">

          <DCArtboard id="hero" label="Editor · primary state" width={1100} height={720}>
            <PaneEditor {...props} />
          </DCArtboard>

          <DCArtboard id="icon-showcase" label="App icon · 3 variants" width={1100} height={280}>
            <IconShowcase dark={tw.dark} accent={tw.accent} />
          </DCArtboard>
        </DCSection>

        <DCSection id="entry" title="Entry & navigation"
          subtitle="The journey from launch to a secret">
          <DCArtboard id="onboarding" label="01 · Onboarding (first run)" width={1100} height={720}>
            <PaneOnboarding {...props} />
          </DCArtboard>
          <DCArtboard id="cluster-picker" label="02 · Multi-cluster picker" width={1100} height={720}>
            <PaneClusterPicker {...props} />
          </DCArtboard>
          <DCArtboard id="cmdk" label="03 · ⌘K global search" width={1100} height={720}>
            <PaneCommandK {...props} />
          </DCArtboard>
        </DCSection>

        <DCSection id="creation" title="Creating secrets"
          subtitle="Type-aware forms — Opaque, TLS, Docker, Basic-auth — plus paste-from-.env">
          <DCArtboard id="create-opaque" label="Create · Opaque" width={1100} height={720}>
            <PaneCreateModal {...props} type="opaque" />
          </DCArtboard>
          <DCArtboard id="create-tls" label="Create · TLS" width={1100} height={720}>
            <PaneCreateModal {...props} type="tls" />
          </DCArtboard>
          <DCArtboard id="create-docker" label="Create · Docker registry" width={1100} height={720}>
            <PaneCreateModal {...props} type="docker" />
          </DCArtboard>
          <DCArtboard id="create-basic" label="Create · Basic auth" width={1100} height={720}>
            <PaneCreateModal {...props} type="basic" />
          </DCArtboard>
          <DCArtboard id="paste-env" label="Paste from .env · with conflict" width={1100} height={720}>
            <PanePasteEnv {...props} />
          </DCArtboard>
        </DCSection>

        <DCSection id="editing" title="Editing & states"
          subtitle="Diff, conflict, binary data, deletion">
          <DCArtboard id="diff" label="Unsaved edits · diff highlight" width={1100} height={720}>
            <PaneEditor {...props} mode="diff" />
          </DCArtboard>
          <DCArtboard id="conflict" label="409 conflict · cluster has newer changes" width={1100} height={720}>
            <PaneEditor {...props} mode="conflict" />
          </DCArtboard>
          <DCArtboard id="binary" label="Binary data row" width={1100} height={720}>
            <PaneEditor {...props} mode="binary" />
          </DCArtboard>
          <DCArtboard id="delete" label="Delete confirmation" width={1100} height={720}>
            <PaneDeleteModal {...props} />
          </DCArtboard>
        </DCSection>

        <DCSection id="config" title="App configuration"
          subtitle="Settings · theme, accent, density, kubeconfig">
          <DCArtboard id="settings" label="Settings · Appearance + Kubernetes" width={1100} height={720}>
            <PaneSettings {...props} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode" value={tw.dark} onChange={(v) => setTweak('dark', v)} />
        <TweakSelect label="Accent" value={tw.accent}
          options={ACCENT_PRESETS.map(p => ({ value: p.hex, label: p.label }))}
          onChange={(v) => setTweak('accent', v)} />
        <TweakColor label="Custom accent" value={tw.accent} onChange={(v) => setTweak('accent', v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={tw.density}
          options={['compact', 'regular', 'comfy']}
          onChange={(v) => setTweak('density', v)} />
        <TweakRadio label="KV layout" value={tw.layout}
          options={['card', 'row']}
          onChange={(v) => setTweak('layout', v)} />
        <TweakToggle label="Sidebar visible" value={tw.sidebarVisible}
          onChange={(v) => setTweak('sidebarVisible', v)} />

        <TweakSection label="App icon" />
        <TweakRadio label="Variant" value={tw.iconVariant}
          options={['A', 'B', 'C']}
          onChange={(v) => setTweak('iconVariant', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
